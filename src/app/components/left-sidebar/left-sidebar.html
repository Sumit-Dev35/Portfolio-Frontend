<aside class="sidebar text-black shadow-lg rounded-4 border border-light">
  <div class="d-flex flex-column h-100">
    <header class="p-4 text-center border-bottom border-secondary">
      <img src="/images/sumit_tiwari_profile_pic.jpg" alt="Sumit_Tiwari_Profile_Photo"
        class="rounded-circle mb-3 profile-pic">
      <h1 class="h4 mb-1 profile-name">
        Sumit Tiwari
      </h1>
      <p class="mb-0 job-profile">
        Full Stack Developer
      </p>
    </header>

    <nav class="flex-grow-1 p-3 nav-wrapper" aria-label="Main Navigation">
      <ul class="nav flex-column">
        <li class="nav-item mb-2">
          <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
            class="nav-link d-flex align-items-center gap-3 px-3 py-3 rounded-3">
            <i class="bi bi-house-door"></i>
            <span class="link-text">
              Home
            </span>
          </a>
        </li>
        <li class="nav-item mb-2">
          <a routerLink="/about" routerLinkActive="active"
            class="nav-link d-flex align-items-center gap-3 px-3 py-3 rounded-3">
            <i class="bi bi-person"></i>
            <span class="link-text">
              About
            </span>
          </a>
        </li>
        <li class="nav-item mb-2">
          <a routerLink="/projects" routerLinkActive="active"
            class="nav-link d-flex align-items-center gap-3 px-3 py-3 rounded-3">
            <i class="bi bi-folder2"></i>
            <span class="link-text">
              Projects
            </span>
          </a>
        </li>
        <li class="nav-item mb-2">
          <a routerLink="/skills" routerLinkActive="active"
            class="nav-link d-flex align-items-center gap-3 px-3 py-3 rounded-3">
            <i class="bi bi-tools"></i>
            <span class="link-text">
              Skills
            </span>
          </a>
        </li>
        <li class="nav-item mb-2">
          <a routerLink="/experience" routerLinkActive="active"
            class="nav-link d-flex align-items-center gap-3 px-3 py-3 rounded-3">
            <i class="bi bi-briefcase"></i>
            <span class="link-text">
              Experience
            </span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/contact" routerLinkActive="active"
            class="nav-link  d-flex align-items-center gap-3 px-3 py-3 rounded-3">
            <i class="bi bi-envelope"></i>
            <span class="link-text">
              Contact
            </span>
          </a>
        </li>
      </ul>
    </nav>

    <footer class="p-4 border-top border-secondary text-center mt-auto">
      <div class="d-flex justify-content-center gap-4 fs-4">
        <a href="https://github.com" target="_blank" class="text-muted"><i class="bi bi-github"></i></a>
        <a href="https://linkedin.com" target="_blank" class="text-muted"><i class="bi bi-linkedin"></i></a>
        <a href="https://twitter.com" target="_blank" class="text-muted"><i class="bi bi-twitter"></i></a>
      </div>
    </footer>

  </div>
</aside>
