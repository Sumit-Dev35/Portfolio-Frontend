<div class="py-5 border-bottom">
  <h2 class="fw-bold mb-4">Education</h2>
  @for (edu of educationDetails; track edu._id) {
  <div class="card border-0 shadow-sm mt-2">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center flex-wrap">
        <div>
          <h5 class="fw-bold">{{edu.degree}}</h5>
          <h6 class="text-primary">{{edu.collegeName}}</h6>
          <p class="text-muted">{{edu.place}} • {{edu.resultType}}: {{edu.obtainedMarks}} / {{edu.totalMarks}}</p>
        </div>
        <span class="badge bg-dark fs-6">{{edu.startDuration|date}} — {{edu.endDuration|date}}</span>
      </div>
    </div>
  </div>
  }
</div>
